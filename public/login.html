<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pereira AI SDR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #050505;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            background: var(--card-bg);
            backdrop-filter: var(--glass-effect);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card:hover {
            border-color: rgba(247, 148, 29, 0.4);
        }
        .login-header {
            margin-bottom: 2.5rem;
        }
        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 30px rgba(247, 148, 29, 0.4);
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }
        p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-glow);
            background: rgba(247, 148, 29, 0.05);
            box-shadow: 0 0 15px rgba(247, 148, 29, 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(247, 148, 29, 0.2);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(247, 148, 29, 0.3);
        }
        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">PA</div>
            <h2>Pereira AI SDR</h2>
            <p>Acesse o comando central da sua IA</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Nome de usuário" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Entrar no Sistema</button>
            <div id="errorMsg" class="error-msg">Credenciais inválidas. Tente novamente.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error('Erro no login:', err);
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
